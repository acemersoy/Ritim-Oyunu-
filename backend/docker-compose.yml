services:
  backend:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - backend-data:/app/data
    environment:
      - UPLOAD_DIR=/app/data/uploads
      - WAV_DIR=/app/data/wav
      - DB_PATH=/app/data/rhythm_game.db
      - CORS_ORIGINS=*
      - MAX_UPLOAD_MB=200
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  tunnel:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate --url http://backend:8000
    networks:
      - app-network
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

networks:
  app-network:
    driver: bridge

volumes:
  backend-data:
